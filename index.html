<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>코브라 게임</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin-top: 50px;
        }
        canvas {
            background-color: #ecf0f1;
            border: 4px solid #34495e;
            border-radius: 5px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        #scoreBoard {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .instructions {
            margin-top: 20px;
            color: #bdc3c7;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="scoreBoard">점수: 0</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="instructions">
        <strong>방향키(↑, ↓, ←, →)</strong>를 사용하여 코브라를 움직이세요.<br>
        빨간색 먹이를 먹으면 점수가 오르고 꼬리가 길어집니다.<br>
        벽이나 자기 몸에 부딪히면 게임이 종료됩니다.
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const gridSize = 20;
        let snake = [{x: 200, y: 200}];
        let food = {x: 100, y: 100};
        let dx = 0;
        let dy = -gridSize;
        let score = 0;
        let changingDirection = false;

        // 키보드 입력 이벤트 리스너
        document.addEventListener("keydown", changeDirection);

        // 게임 루프
        function main() {
            if (hasGameEnded()) {
                alert(`게임 오버! 최종 점수: ${score}\n확인을 누르고 새로고침(F5)하여 다시 시작하세요.`);
                return;
            }

            changingDirection = false;
            setTimeout(function onTick() {
                clearCanvas();
                drawFood();
                advanceSnake();
                drawSnake();
                main();
            }, 100); // 100ms마다 화면 갱신 (게임 속도)
        }

        // 캔버스 초기화
        function clearCanvas() {
            ctx.fillStyle = "#ecf0f1";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // 코브라 그리기
        function drawSnake() {
            snake.forEach(drawSnakePart);
        }

        // 코브라의 각 부분 그리기
        function drawSnakePart(snakePart, index) {
            ctx.fillStyle = index === 0 ? "#27ae60" : "#2ecc71"; // 머리는 진한 초록, 몸통은 연한 초록
            ctx.strokeStyle = "#2c3e50";
            ctx.fillRect(snakePart.x, snakePart.y, gridSize, gridSize);
            ctx.strokeRect(snakePart.x, snakePart.y, gridSize, gridSize);
        }

        // 코브라 이동 및 먹이 섭취 처리
        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // 새로운 머리 추가

            const didEatFood = snake[0].x === food.x && snake[0].y === food.y;
            if (didEatFood) {
                score += 10;
                document.getElementById('scoreBoard').innerText = `점수: ${score}`;
                generateFood(); // 새 먹이 생성
            } else {
                snake.pop(); // 먹이를 먹지 않았다면 꼬리 제거
            }
        }

        // 먹이 그리기
        function drawFood() {
            ctx.fillStyle = "#e74c3c";
            ctx.strokeStyle = "#c0392b";
            ctx.fillRect(food.x, food.y, gridSize, gridSize);
            ctx.strokeRect(food.x, food.y, gridSize, gridSize);
        }

        // 그리드에 맞춘 랜덤 좌표 생성
        function randomTen(min, max) {
            return Math.round((Math.random() * (max - min) + min) / gridSize) * gridSize;
        }

        // 먹이 생성 로직 (코브라 몸통과 겹치지 않도록)
        function generateFood() {
            food.x = randomTen(0, canvas.width - gridSize);
            food.y = randomTen(0, canvas.height - gridSize);
            
            snake.forEach(function isFoodOnSnake(part) {
                if (part.x === food.x && part.y === food.y) generateFood();
            });
        }

        // 방향 전환 로직
        function changeDirection(event) {
            const LEFT_KEY = 37;
            const RIGHT_KEY = 39;
            const UP_KEY = 38;
            const DOWN_KEY = 40;

            if (changingDirection) return;
            
            const keyPressed = event.keyCode;
            const goingUp = dy === -gridSize;
            const goingDown = dy === gridSize;
            const goingRight = dx === gridSize;
            const goingLeft = dx === -gridSize;

            // 반대 방향으로 즉시 이동하는 것을 방지
            if (keyPressed === LEFT_KEY && !goingRight) {
                dx = -gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === UP_KEY && !goingDown) {
                dx = 0;
                dy = -gridSize;
                changingDirection = true;
            }
            if (keyPressed === RIGHT_KEY && !goingLeft) {
                dx = gridSize;
                dy = 0;
                changingDirection = true;
            }
            if (keyPressed === DOWN_KEY && !goingUp) {
                dx = 0;
                dy = gridSize;
                changingDirection = true;
            }
        }

        // 게임 종료 조건 검사
        function hasGameEnded() {
            // 자기 몸통과 부딪혔는지 검사
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) return true;
            }
            
            // 벽에 부딪혔는지 검사
            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x >= canvas.width - gridSize + 1;
            const hitToptWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y >= canvas.height - gridSize + 1;

            return hitLeftWall || hitRightWall || hitToptWall || hitBottomWall;
        }

        // 게임 시작 초기화
        generateFood();
        main();
    </script>
</body>
</html>
